name: Playwright BDD Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run BDD Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run BDD tests
        run: npm run test:bdd
        env:
          HEADLESS: 'true'
          CI: 'true'

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: |
            test_automation/cucumber-report.html
            test_automation/cucumber-report.json
            test_automation/__screenshots__/
            test-results/
          retention-days: 30

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            
            // Try to read the cucumber report
            const reportPath = 'test_automation/cucumber-report.json';
            let testSummary = 'Test execution completed.';
            
            try {
              if (fs.existsSync(reportPath)) {
                const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
                const scenarios = report[0]?.elements || [];
                const passed = scenarios.filter(s => s.steps.every(st => st.result.status === 'passed')).length;
                const failed = scenarios.filter(s => s.steps.some(st => st.result.status === 'failed')).length;
                testSummary = `✅ Passed: ${passed} | ❌ Failed: ${failed} | Total: ${scenarios.length}`;
              }
            } catch (e) {
              console.log('Could not parse report');
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 BDD Test Results\n\n${testSummary}\n\n📊 View detailed reports in the [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) section.`
            });
